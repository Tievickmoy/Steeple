<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Donegal MTB Trails</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#map {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 100%;
}

/* Popup */
.mapboxgl-popup { max-width: 320px !important; }
.mapboxgl-popup-content {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #fc4c02;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Segoe UI', sans-serif;
    max-height: 520px;
    overflow-y: auto;
}

/* Video */
.video-wrapper {
    position: relative;
    padding-bottom: 177.77%;
    height: 0;
    overflow: hidden;
    border-radius: 8px;
    margin: 12px 0;
    background: #000;
}
.is-normal-video { padding-bottom: 56.25%; }

.video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 0;
}

/* Text */
.trail-title { color: #00d2ff; font-size: 18px; font-weight: 700; }
.trail-desc { font-size: 13px; color: #ccc; margin-top: 10px; }

/* Hint */
#mobile-hint {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 13px;
    border: 1px solid #00d2ff;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
    z-index: 9999;
}

#mobile-hint.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Feedback */
#feedback-link {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(26,26,26,0.9);
    color: #fff;
    padding: 10px 16px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>

<body>

<div id="mobile-hint">Tap trails for more</div>
<div id="map"></div>
<a id="feedback-link" href="https://forms.gle/3tyvrU9YyezbzeMX6" target="_blank">Get in touch</a>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

/* Hint logic */
const hint = document.getElementById('mobile-hint');
let hintTimeout;

function showHint() {
    hint.classList.add('show');
}

function hideHint() {
    hint.classList.remove('show');
}

function resetHintTimer() {
    clearTimeout(hintTimeout);
    hideHint();

    hintTimeout = setTimeout(() => {
        showHint();
    }, 10000);
}

/* Map */
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095',
   center: [-7.73, 54.83],
    zoom: 14.5,
    pitch: 80,
    bearing: 50
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');

map.on('load', () => {

    /* Show hint after short delay */
    setTimeout(showHint, 1000);

    /* Hide on first interaction */
    map.once('click', hideHint);
    map.once('touchstart', hideHint);

    /* Track activity */
    map.on('click', resetHintTimer);
    map.on('move', resetHintTimer);
    map.on('touchstart', resetHintTimer);

    /* Click trails */
    map.on('click', (e) => {
        const features = map.queryRenderedFeatures(e.point);
        if (!features.length) return;

        const p = features[0].properties;
        if (!p.name) return;

        map.flyTo({
            center: e.lngLat,
            offset: [0, 120],
            speed: 0.6
        });

        const videoId = getYoutubeId(p.youtube);
        let videoHtml = '';

        if (videoId) {
            const isShort = (p.youtube || '').includes('shorts');
            videoHtml = `
                <div class="video-wrapper ${isShort ? '' : 'is-normal-video'}">
                    <iframe src="https://www.youtube-nocookie.com/embed/${videoId}" allowfullscreen></iframe>
                </div>
            `;
        }

        const html = `
            <h3 class="trail-title">${p.name}</h3>
            ${videoHtml}
            <div class="trail-desc">${p.description || ''}</div>
        `;

        new mapboxgl.Popup({ offset: 15 })
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);
    });

    map.on('mousemove', (e) => {
        const f = map.queryRenderedFeatures(e.point);
        map.getCanvas().style.cursor = f.length ? 'pointer' : '';
    });
});

/* YouTube helper */
function getYoutubeId(url) {
    if (!url) return null;
    const match = url.match(/(?:youtu\.be\/|v=|shorts\/)([^"&?\/\s]{11})/);
    return match ? match[1] : null;
}
</script>

</body>
</html>
