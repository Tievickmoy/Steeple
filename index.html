<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Reset Mapbox default styles that cause flickering */
        .mapboxgl-popup { z-index: 100; transition: none !important; }
        .mapboxgl-popup-content { 
            background: transparent !important; 
            box-shadow: none !important; 
            padding: 0 !important; 
        }
        .mapboxgl-popup-tip { border-top-color: #fc4c02 !important; }

        /* The NEW Scaling Container */
        #popup-scaler {
            transform-origin: bottom center;
            transition: transform 0.1s ease-out;
            background: #1a1a1a;
            color: #fff;
            border: 2px solid #fc4c02;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 280px;
            max-height: 450px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Video & Text Styles */
        .video-wrapper { position: relative; padding-bottom: 177.77%; height: 0; overflow: hidden; border-radius: 8px; margin: 12px 0; background: #000; }
        .is-normal-video { padding-bottom: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .trail-title { color: #00d2ff; margin: 0 0 10px 0; font-size: 18px; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .strava-container { background: rgba(252, 76, 2, 0.15); border: 1px solid rgba(252, 76, 2, 0.4); border-radius: 8px; padding: 10px; margin-bottom: 5px; }
        .s-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .s-label { color: #aaa; text-transform: uppercase; font-size: 9px; font-weight: bold; }
        .s-value { color: #fff; font-weight: bold; }
        .kom-val { color: #ffcc00; }
        .trail-desc { margin-top: 10px; font-size: 13px; line-height: 1.4; color: #ccc; border-top: 1px solid #333; padding-top: 10px; }
        
        #loading-msg { color: #fc4c02; font-size: 11px; text-align: center; padding: 5px 0; }
    </style>
</head>

            scale = Math.max(0.5, Math.min(scale, 1.8)); 
            scaler.style.transform = `scale(${scale})`;
        }
    }

    map.on('zoom', updatePopupScale);
