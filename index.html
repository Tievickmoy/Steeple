<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails | GitHub Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Mobile Prompt */
        #mobile-hint { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 10; background: rgba(0,0,0,0.85); color: #00d2ff; 
            padding: 12px 24px; border-radius: 30px; font-size: 14px; 
            font-weight: bold; pointer-events: none; border: 1px solid #fc4c02; 
            text-align: center; transition: opacity 1s ease;
        }

        /* Popup Styling */
        .mapboxgl-popup { max-width: 320px !important; z-index: 100; }
        .mapboxgl-popup-content { 
            background: #1a1a1a !important; color: #fff !important; 
            border: 1px solid #fc4c02; border-radius: 12px; padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-wrapper {
            position: relative; padding-bottom: 177.77%; /* 9:16 Shorts Ratio */
            height: 0; overflow: hidden; border-radius: 8px; margin: 12px 0; background: #000;
        }

        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .trail-title { color: #00d2ff; margin: 0; font-size: 18px; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .watch-link {
            display: block; text-align: center; background: #333; color: #00d2ff; 
            text-decoration: none; padding: 10px; border-radius: 5px; 
            font-size: 12px; font-weight: bold; margin-top: 5px; border: 1px solid #444;
        }

        .trail-desc { font-size: 12px; color: #ccc; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="mobile-hint">Tap trails for info & video</div>
    <div id="map"></div>

<script>
    const STRAVA_CONFIG = {
        clientId: '213106',
        clientSecret: '1a482e4253732794bd882dc298c7b7132bd3321f',
        refreshToken: '872351372af0ebffffaa1584f5eaac57b5c4c7ad'
    };

    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

    // Extraction logic
    function getYoutubeId(url) {
        if (!url) return null;
        const match = String(url).match(/(?:v=|shorts\/|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/i);
        return (match && match[1]) ? match[1] : null;
    }

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095?fresh=true',
        center: [-7.730883, 54.829779],
        zoom: 14,
        pitch: 45,
        bearing: -10
    });

    map.on('load', () => {
        // Essential for GitHub/Laptop rendering
        map.resize();

        // Fade out hint
        setTimeout(() => {
            const hint = document.getElementById('mobile-hint');
            if (hint) hint.style.opacity = '0';
        }, 5000);

        map.on('click', (e) => {
            const features = map.queryRenderedFeatures(e.point);
            if (!features.length) return;

            const p = features[0].properties;
            const videoId = getYoutubeId(p.Youtube || p.youtube);
            
            let videoHtml = '';
            if (videoId) {
                // For GitHub Pages, we use the bare embed URL with no-referrer
                // This is the most compatible way to bypass CSP blocks
                videoHtml = `
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}" 
                            title="YouTube video player"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            referrerpolicy="no-referrer"
                            allowfullscreen>
                        </iframe>
                    </div>
                    <a href="https://youtube.com/shorts/${videoId}" target="_blank" class="watch-link">Open in YouTube App ↗</a>
                `;
            }

            const description = p.Description || p.description || "";

            new mapboxgl.Popup({ offset: 15, anchor: 'bottom' })
                .setLngLat(e.lngLat)
                .setHTML(`
                    <h3 class="trail-title">${p.name || 'Trail'}</h3>
                    ${videoHtml}
                    <div class="trail-desc">${description}</div>
                `)
                .addTo(map);
        });

        // Pointer cursor hover
        map.on('mousemove', (e) => {
            const f = map.queryRenderedFeatures(e.point);
            map.getCanvas().style.cursor = f.length ? 'pointer' : '';
        });
    });
</script>
</body>
</html>
