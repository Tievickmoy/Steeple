<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background-color: #111; }

        .mapboxgl-popup-content {
            background: #222 !important; 
            color: #fff !important;
            border: 1px solid #00d2ff;
            border-radius: 8px;
            padding: 15px;
            font-family: sans-serif;
        }
        .mapboxgl-popup-tip { border-top-color: #222 !important; }

        #mobile-hint {
            position: absolute; 
            bottom: 120px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            background: rgba(0,0,0,0.85); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 30px; 
            font-size: 13px; 
            pointer-events: none; 
            border: 1px solid #00d2ff;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="mobile-hint">Tap trails for info & descriptions</div>
<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095', 
        center: [-7.730883, 54.829779], 
        zoom: 14,
        pitch: 62,
        bearing: -20
    });

    map.on('load', () => {
        // Simple 3D Terrain
        map.addSource('mapbox-dem', {
            'type': 'raster-dem',
            'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
            'tileSize': 512
        });
        map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

        // Hide hint after 4 seconds
        setTimeout(() => {
            const hint = document.getElementById('mobile-hint');
            if (hint) hint.style.display = 'none';
        }, 4000);

        // Optimized Click Logic
        map.on('click', (e) => {
            // Buffer for mobile fingers
            const width = 10;
            const height = 10;
            const features = map.queryRenderedFeatures([
                [e.point.x - width / 2, e.point.y - height / 2],
                [e.point.x + width / 2, e.point.y + height / 2]
            ]);

            if (features.length > 0) {
                const target = features.find(f => f.properties.Description);
                if (target) {
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`
                            <h3 style="margin:0; color:#00d2ff;">${target.properties.name || "Trail"}</h3>
                            <p style="margin:10px 0 0 0;">${target.properties.Description}</p>
                        `)
                        .addTo(map);
                }
            }
        });

        // Pointer Cursor
        map.on('mousemove', (e) => {
            const features = map.queryRenderedFeatures(e.point);
            map.getCanvas().style.cursor = (features.length > 0) ? 'pointer' : '';
        });
    });

    map.addControl(new mapboxgl.NavigationControl(), 'top-right');
</script>

</body>
</html>
