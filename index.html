<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Donegal MTB Trails</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
}
#map {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 100%;
}

/* Popup */
.mapboxgl-popup { max-width: 320px !important; }
.mapboxgl-popup-content {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #fc4c02;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Segoe UI', sans-serif;
    max-height: 520px;
    overflow-y: auto;
}

/* Video */
.video-wrapper {
    position: relative;
    padding-bottom: 177.77%;
    height: 0;
    overflow: hidden;
    border-radius: 8px;
    margin: 12px 0;
    background: #000;
}
.is-normal-video { padding-bottom: 56.25%; }

.video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 0;
}

/* Text */
.trail-title { color: #00d2ff; font-size: 18px; font-weight: 700; }
.trail-desc { font-size: 13px; color: #ccc; margin-top: 10px; }

/* Strava */
.strava-container {
    background: rgba(252,76,2,0.1);
    border: 1px solid rgba(252,76,2,0.3);
    border-radius: 8px;
    padding: 10px;
}
.s-row { display: flex; justify-content: space-between; font-size: 12px; }
.s-label { color: #888; }
.s-value { font-weight: bold; }

/* Hint */
#mobile-hint {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 10px 20px;
    border-radius: 25px;
}

/* Feedback button */
#feedback-link {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(26,26,26,0.9);
    color: #fff;
    padding: 10px 16px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>

<body>

<div id="mobile-hint">Tap trails for more</div>
<div id="map"></div>
<a id="feedback-link" href="https://forms.gle/3tyvrU9YyezbzeMX6" target="_blank">Get in touch</a>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

const STRAVA_CONFIG = {
    clientId: '213106',
    clientSecret: 'YOUR_SECRET',
    refreshToken: 'YOUR_REFRESH'
};

function getYoutubeId(url) {
    if (!url) return null;
    const match = url.match(/(?:youtu\.be\/|v=|shorts\/)([^"&?\/\s]{11})/);
    return match ? match[1] : null;
}

async function getStravaToken() {
    const res = await fetch('https://www.strava.com/api/v3/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            client_id: STRAVA_CONFIG.clientId,
            client_secret: STRAVA_CONFIG.clientSecret,
            refresh_token: STRAVA_CONFIG.refreshToken,
            grant_type: 'refresh_token'
        })
    });
    const data = await res.json();
    return data.access_token;
}

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095',
    center: [-7.73, 54.82],
    zoom: 14,
    pitch: 60,
    bearing: -20
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');

map.on('load', () => {

    setTimeout(() => {
        document.getElementById('mobile-hint').style.display = 'none';
    }, 4000);

    map.on('click', async (e) => {

        const features = map.queryRenderedFeatures(e.point);
        if (!features.length) return;

        const p = features[0].properties;
        if (!p.name) return;

        map.flyTo({
            center: e.lngLat,
            offset: [0, 120],
            speed: 0.6
        });

        const videoId = getYoutubeId(p.youtube);
        let videoHtml = '';

        if (videoId) {
            const isShort = (p.youtube || '').includes('shorts');
            videoHtml = `
                <div class="video-wrapper ${isShort ? '' : 'is-normal-video'}">
                    <iframe src="https://www.youtube-nocookie.com/embed/${videoId}" allowfullscreen></iframe>
                </div>
            `;
        }

        let html = `<h3 class="trail-title">${p.name}</h3>${videoHtml}<div class="trail-desc">${p.description || ''}</div>`;

        const popup = new mapboxgl.Popup({ offset: 15 })
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);

        if (p.segment) {
            popup.setHTML(html + "<div>Loading Strava...</div>");

            try {
                const token = await getStravaToken();
                const res = await fetch(`https://www.strava.com/api/v3/segments/${p.segment}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const s = await res.json();

                const stravaHtml = `
                    <div class="strava-container">
                        <div class="s-row"><span>Distance</span><span>${(s.distance/1000).toFixed(2)} km</span></div>
                        <div class="s-row"><span>Attempts</span><span>${s.effort_count}</span></div>
                    </div>
                `;

                popup.setHTML(html + stravaHtml);

            } catch {
                popup.setHTML(html);
            }
        }
    });

    map.on('mousemove', (e) => {
        const f = map.queryRenderedFeatures(e.point);
        map.getCanvas().style.cursor = f.length ? 'pointer' : '';
    });

});
</script>

</body>
</html>
