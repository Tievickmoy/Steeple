<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        
        .mapboxgl-popup-content {
            background: #222 !important; 
            color: #fff !important;
            border: 1px solid #00d2ff;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .mapboxgl-popup-tip {
            border-top-color: #222 !important;
        }
        .mapboxgl-popup-close-button {
            color: #fff;
            padding: 5px;
        }
    </style>
</head>

<div id="mobile-hint" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; pointer-events: none; border: 1px solid #00d2ff;">
    Tap trails for descriptions
</div>
    
<body>

<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

    const map = new mapboxgl.Map({
        container: 'map',
        
        style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095?version=' + Date.now(), 
        center: [-7.730883, 54.829779], 
        zoom: 14,
        pitch: 62,
        bearing: -20,
        antialias: true
    });

    function add3DEffects() {
        if (!map.getSource('mapbox-dem')) {
            map.addSource('mapbox-dem', {
                'type': 'raster-dem',
                'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                'tileSize': 512
            });
        }
        map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });
        map.setFog({ 'range': [0.5, 10], 'color': 'white', 'horizon-blend': 0.1 });
    }

    map.on('load', () => {
        map.resize();
        add3DEffects();

        
        map.on('click', (e) => {
            
            const features = map.queryRenderedFeatures(e.point);

            if (features.length > 0) {
                
                const targetFeature = features.find(f => f.properties.Description);

                if (targetFeature) {
                    const props = targetFeature.properties;
                    const name = props.name || props.Name || "MTB Trail";
                    const desc = props.Description;

                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`
                            <div style="min-width: 180px;">
                                <h3 style="margin:0; color:#00d2ff; font-size:16px;">${name}</h3>
                                <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
                                <p style="margin:0; font-size:14px; line-height:1.5;">${desc}</p>
                            </div>
                        `)
                        .addTo(map);
                }
            }
        });

        
        map.on('mousemove', (e) => {
            const features = map.queryRenderedFeatures(e.point);
            const isHoveringData = features.some(f => f.properties.Description);
            map.getCanvas().style.cursor = isHoveringData ? 'pointer' : '';
        });

        
        geolocate.trigger();
    });

    
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    const geolocate = new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true,
        showUserLocation: true
    });
    map.addControl(geolocate, 'top-right');

</script>

</body>
</html>
