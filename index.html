<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        
        .mapboxgl-popup-content { 
            background: #1a1a1a !important; 
            color: #fff !important; 
            border: 1px solid #fc4c02; 
            border-radius: 12px; 
            padding: 15px; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            min-width: 240px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .mapboxgl-popup-tip { border-top-color: #fc4c02 !important; }
        
  
        .trail-title { color: #00d2ff; margin: 0 0 12px 0; font-size: 19px; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .strava-container { background: rgba(252, 76, 2, 0.1); border: 1px solid rgba(252, 76, 2, 0.3); border-radius: 8px; padding: 10px; margin-bottom: 12px; }
        .s-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .s-label { color: #888; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; font-weight: bold; }
        .s-value { color: #fff; font-weight: bold; }
        .kom-val { color: #ffcc00; font-weight: bold; }

        .trail-desc { margin: 0; font-size: 13px; line-height: 1.5; color: #ccc; border-top: 1px solid #333; padding-top: 10px; }
        
        #loading-msg { color: #fc4c02; font-size: 11px; font-style: italic; text-align: center; padding: 10px 0; }
        #mobile-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 30px; font-size: 13px; pointer-events: none; border: 1px solid #00d2ff; text-align: center; transition: opacity 1s; }
    </style>
</head>
<body>
    <div id="mobile-hint">Tap trails for info</div>
    <div id="map"></div>

<script>
    const STRAVA_CONFIG = {
        clientId: '213106',
        clientSecret: '1a482e4253732794bd882dc298c7b7132bd3321f',
        refreshToken: '872351372af0ebffffaa1584f5eaac57b5c4c7ad'
    };

    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095',
        center: [-7.730883, 54.829779],
        zoom: 14,
        pitch: 60,
        bearing: -20,
        antialias: true
    });

    async function getStravaToken() {
        const res = await fetch('https://www.strava.com/api/v3/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                client_id: STRAVA_CONFIG.clientId,
                client_secret: STRAVA_CONFIG.clientSecret,
                refresh_token: STRAVA_CONFIG.refreshToken,
                grant_type: 'refresh_token'
            })
        });
        const d = await res.json();
        return d.access_token;
    }

    const geolocate = new mapboxgl.GeolocateControl({ trackUserLocation: true, showUserHeading: true });
    map.addControl(geolocate, 'top-right');
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    map.on('load', () => {
        setTimeout(() => { geolocate.trigger(); }, 3000);
        setTimeout(() => { document.getElementById('mobile-hint').style.opacity = '0'; }, 6000);

        map.on('click', async (e) => {
            const features = map.queryRenderedFeatures([[e.point.x - 15, e.point.y - 15], [e.point.x + 15, e.point.y + 15]]);
            if (features.length > 0) {
                const p = features[0].properties;
                if (!p.name && !p.Description && !p.description) return;

                // 1. Prepare HTML Pieces
                const titleHtml = `<h3 class="trail-title">${p.name || "MTB Trail"}</h3>`;
                const descHtml = `<div class="trail-desc">${p.Description || p.description || "No description available."}</div>`;
                const segId = p.segment || p.Segment || p.SEGMENT;

                const popup = new mapboxgl.Popup().setLngLat(e.lngLat).setHTML(titleHtml + descHtml).addTo(map);

                // 2. Inject Strava stats between Title and Description if Segment ID exists
                if (segId) {
                    popup.setHTML(titleHtml + `<div id="loading-msg">Syncing Strava live data...</div>` + descHtml);
                    
                    try {
                        const token = await getStravaToken();
                        const sRes = await fetch(`https://www.strava.com/api/v3/segments/${segId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const s = await sRes.json();

                        const stravaHtml = `
                            <div class="strava-container">
                                <div class="s-row"><span class="s-label">Distance</span><span class="s-value">${(s.distance/1000).toFixed(2)}km</span></div>
                                <div class="s-row"><span class="s-label">Efforts</span><span class="s-value">${s.effort_count.toLocaleString()}</span></div>
                                <div class="s-row"><span class="s-label">KOM Record</span><span class="kom-val">${s.xoms?.kom || 'Private'}</span></div>
                                <div style="text-align:center; margin-top:8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
                                    <a href="https://www.strava.com/segments/${segId}" target="_blank" style="color:#fc4c02; font-size:10px; text-decoration:none; font-weight:bold;">OPEN IN STRAVA ↗</a>
                                </div>
                            </div>
                        `;

                    
                        popup.setHTML(titleHtml + stravaHtml + descHtml);
                    } catch (err) {
                        console.error(err);
                        popup.setHTML(titleHtml + `<div id="loading-msg" style="color:#666;">Strava stats offline</div>` + descHtml);
                    }
                }
            }
        });

        map.on('mousemove', (e) => {
            const f = map.queryRenderedFeatures(e.point);
            map.getCanvas().style.cursor = f.length ? 'pointer' : '';
        });
        map.resize();
    });

    geolocate.on('error', (e) => { if (e.error.code === 1) alert("Location denied. Reset browser permissions."); });
</script>
</body>
</html>
