<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        .mapboxgl-popup-content {
            background: #222 !important; 
            color: #fff !important;
            border: 1px solid #00d2ff;
            border-radius: 8px;
            padding: 15px;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .mapboxgl-popup-tip { border-top-color: #222 !important; }
        .mapboxgl-popup-close-button { color: #fff; padding: 5px; }

        #mobile-hint {
            position: absolute; 
            bottom: 120px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            background: rgba(0,0,0,0.85); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 30px; 
            font-size: 13px; 
            pointer-events: none; 
            border: 1px solid #00d2ff;
            transition: opacity 1.5s ease;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="map"></div>

    const map = new mapboxgl.Map({

                'tileSize': 512
            });
        }
        map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

    }

                hint.style.opacity = '0';

            }
        }, 4000);
