<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="utf-8">
<title>Donegal MTB Trails</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#map {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 100%;
}

.mapboxgl-popup { max-width: 450px !important; }
.mapboxgl-popup-content {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #fc4c02;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Segoe UI', sans-serif;
    max-height: 520px;
    overflow-y: auto;
}

.video-wrapper {
    position: relative;
    padding-bottom: 177.77%;
    height: 0;
    overflow: hidden;
    border-radius: 8px;
    margin: 12px 0;
    background: #000;
}

.is-normal-video { padding-bottom: 56.25%; }

.video-wrapper iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 0;
}

.trail-title { color: #00d2ff; font-size: 18px; font-weight: 700; margin: 0 0 10px 0; }
.trail-desc { font-size: 13px; color: #ccc; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }

.strava-container {
    background: rgba(252, 76, 2, 0.1);
    border: 1px solid rgba(252, 76, 2, 0.3);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 5px;
}

.s-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
.s-label { color: #888; font-size: 10px; text-transform: uppercase; }
.s-value { color: #fff; font-weight: bold; }
.kom-val { color: #ffcc00; font-weight: bold; }

#loading-msg { color: #fc4c02; font-size: 11px; text-align: center; padding: 5px 0; }

#mobile-hint {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 13px;
    border: 1px solid #00d2ff;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    z-index: 9999;
}

#mobile-hint.show { opacity: 1; }

#feedback-link {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(26,26,26,0.9);
    color: #fff;
    padding: 10px 16px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>

<body>

<div id="mobile-hint">Tap trails for more</div>
<div id="map"></div>
<a id="feedback-link" href="https://forms.gle/3tyvrU9YyezbzeMX6" target="_blank">Get in touch</a>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

const STRAVA_CONFIG = {
    clientId: '213106',
    clientSecret: '1a482e4253732794bd882dc298c7b7132bd3321f',
    refreshToken: '872351372af0ebffffaa1584f5eaac57b5c4c7ad'
};

async function getStravaToken() {
    const res = await fetch('https://www.strava.com/api/v3/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            client_id: STRAVA_CONFIG.clientId,
            client_secret: STRAVA_CONFIG.clientSecret,
            refresh_token: STRAVA_CONFIG.refreshToken,
            grant_type: 'refresh_token'
        })
    });
    const d = await res.json();
    return d.access_token;
}

function getYoutubeId(url) {
    if (!url) return null;
    const regex = /(?:youtube\.com\/(?:.*v=|.*\/|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
}

const map = new mapboxgl.Map({  
    container: 'map',
    style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095',
    center: [-7.73, 54.83],
    zoom: 13.5,
    pitch: 50,
    bearing: 0
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');

map.addControl(new mapboxgl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true
}), 'top-right');

map.on('load', () => {

    setTimeout(() => {
        const hint = document.getElementById('mobile-hint');
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 5000);
    }, 1000);

    map.on('click', async (e) => {

        // ✅ 1. CHECK CAR PARKS FIRST (specific layer)
        const carparkFeatures = map.queryRenderedFeatures(e.point, {
            layers: ['carparks']
        });

        if (carparkFeatures.length) {
            const p = carparkFeatures[0].properties;

            const name = p.Name || 'Car Park';
            const desc = p.Description || '';

            map.flyTo({ center: e.lngLat, offset: [0, 120], speed: 0.6 });

            new mapboxgl.Popup({ anchor: 'bottom', offset: 15 })
                .setLngLat(e.lngLat)
                .setHTML(`
                    <h3 class="trail-title">${name}</h3>
                    <div class="trail-desc">${desc}</div>
                `)
                .addTo(map);

            return;
        }

        // ✅ 2. TRAILS (fallback)
        const features = map.queryRenderedFeatures(
            [[e.point.x - 10, e.point.y - 10], [e.point.x + 10, e.point.y + 10]]
        );

        if (!features.length) return;

        const p = features[0].properties;
        if (!p.name) return;

        map.flyTo({ center: e.lngLat, offset: [0, 120], speed: 0.6 });

        const titleHtml = `<h3 class="trail-title">${p.name}</h3>`;
        const descHtml = `<div class="trail-desc">${p.description || ''}</div>`;

        const popup = new mapboxgl.Popup({ anchor: 'bottom', offset: 15 })
            .setLngLat(e.lngLat)
            .setHTML(titleHtml + `<div id="loading-msg">Fetching Strava Data...</div>`)
            .addTo(map);

        const videoId = getYoutubeId(p.youtube || p.Youtube);
        let videoHtml = '';

        if (videoId) {
            const isShort = (p.youtube || p.Youtube || '').includes('shorts');
            const wrapperClass = isShort ? 'video-wrapper' : 'video-wrapper is-normal-video';
            videoHtml = `
                <div class="${wrapperClass}">
                    <iframe src="https://www.youtube-nocookie.com/embed/${videoId}?rel=0"
                        allowfullscreen></iframe>
                </div>
            `;
        }

        const segId = p.segment || p.Segment || p.SEGMENT;

        let finalHtml = titleHtml + videoHtml + descHtml;

        if (segId) {
            try {
                const token = await getStravaToken();
                const sRes = await fetch(`https://www.strava.com/api/v3/segments/${segId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const s = await sRes.json();

                const stravaHtml = `
                    <div class="strava-container">
                        <div class="s-row"><span class="s-label">Dist</span><span class="s-value">${(s.distance/1000).toFixed(2)} km</span></div>
                        <div class="s-row"><span class="s-label">Attempts</span><span class="s-value">${s.effort_count?.toLocaleString() || 'N/A'}</span></div>
                        <div class="s-row"><span class="s-label">KOM</span><span class="kom-val">${s.xoms?.kom || 'N/A'}</span></div>
                    </div>
                `;

                finalHtml = titleHtml + stravaHtml + videoHtml + descHtml;
            } catch (err) {
                finalHtml = titleHtml + videoHtml + descHtml;
            }
        }

        popup.setHTML(finalHtml);
    });

    map.on('mousemove', (e) => {
        const f = map.queryRenderedFeatures(e.point);
        map.getCanvas().style.cursor = f.length ? 'pointer' : '';
    });

});
</script>

</body>
</html>
