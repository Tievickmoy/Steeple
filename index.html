<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        .mapboxgl-ctrl-top-right { z-index: 50 !important; }
        .mapboxgl-popup-content { background: #222 !important; color: #fff !important; border: 1px solid #00d2ff; border-radius: 8px; padding: 15px; font-family: sans-serif; }
        #mobile-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 30px; font-size: 13px; pointer-events: none; border: 1px solid #00d2ff; text-align: center; transition: opacity 1s; }
    </style>
</head>
<body>
    <div id="mobile-hint">Tap trails for info</div>
    <div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095',
        center: [-7.730883, 54.829779],
        zoom: 14,
        pitch: 60,
        bearing: -20,
        antialias: true
    });

    const geolocate = new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true, timeout: 10000 },
        trackUserLocation: true,
        showUserHeading: true
    });

    map.addControl(geolocate, 'top-right');
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    map.on('load', () => {
        // Force GPS trigger with a delay for Android
        setTimeout(() => { 
            console.log("Attempting GPS trigger...");
            geolocate.trigger(); 
        }, 3000);

        // Fade hint
        setTimeout(() => { 
            const h = document.getElementById('mobile-hint');
            if(h) h.style.opacity = '0';
        }, 5000);

        // Touch Buffer Click Logic
        map.on('click', (e) => {
            const features = map.queryRenderedFeatures([
                [e.point.x - 15, e.point.y - 15],
                [e.point.x + 15, e.point.y + 15]
            ]);
            if (features.length > 0) {
                const p = features[0].properties;
                if (p.name || p.Description || p.description) {
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML('<h3 style="color:#00d2ff;margin:0">'+(p.name || "Trail")+'</h3><p style="margin-top:10px;">'+(p.Description || p.description || "No description")+'</p>')
                        .addTo(map);
                }
            }
        });
        map.resize();
    });

    // ANDROID DEBUGGING ALERTS
    geolocate.on('error', (e) => {
        if (e.error.code === 1) {
            alert("Location denied. Please click the 'Lock' icon in your browser address bar and Reset Permissions.");
        } else if (e.error.code === 2) {
            alert("GPS signal not found. Are you indoors?");
        } else {
            alert("Location error: " + e.error.message);
        }
    });

    geolocate.on('geolocate', () => {
        console.log("User located successfully.");
    });
</script>
</body>
</html>
