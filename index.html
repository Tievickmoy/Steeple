<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donegal MTB Trails | Universal Video Support</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Discreet Feedback Button */
        #feedback-btn {
            position: absolute;
            bottom: 25px;
            right: 10px;
            z-index: 10;
            background: rgba(26, 26, 26, 0.7);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 11px;
            text-decoration: none;
            border: 1px solid #444;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        #feedback-btn:hover {
            border-color: #fc4c02;
            color: #fff;
            background: rgba(26, 26, 26, 0.9);
        }

        /* Popup Styling */
        .mapboxgl-popup { max-width: 320px !important; z-index: 100; }
        .mapboxgl-popup-content { 
            background: #1a1a1a !important; 
            color: #fff !important; 
            border: 1px solid #fc4c02; 
            border-radius: 12px; 
            padding: 15px; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 520px; 
            overflow-y: auto;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; 
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            margin: 12px 0;
            background: #000;
            border: 1px solid #333;
        }
        .is-normal-video { padding-bottom: 56.25%; } 

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .trail-title { color: #00d2ff; margin: 0 0 12px 0; font-size: 19px; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .trail-desc { margin: 12px 0 0 0; font-size: 13px; line-height: 1.5; color: #ccc; border-top: 1px solid #333; padding-top: 10px; }
        
        .mapboxgl-popup-content::-webkit-scrollbar { width: 6px; }
        .mapboxgl-popup-content::-webkit-scrollbar-thumb { background: #fc4c02; border-radius: 10px; }

        #mobile-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 30px; font-size: 13px; pointer-events: none; border: 1px solid #00d2ff; text-align: center; transition: opacity 1s; }
    </style>
</head>
<body>

    <a id="feedback-btn" href="https://forms.gle/3tyvrU9YyezbzeMX6" target="_blank">Feedback</a>

    <div id="mobile-hint">Tap trails for more</div>
    <div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RlZXBsZWNoYXNlciIsImEiOiJjbW10am4yYjIwMXgwMnFzYTBvdHZwb3VkIn0.Khr0X4QAJNIb18p-EIE-Eg';

    function getYoutubeId(url) {
        if (!url) return null;
        const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|shorts\/|watch\?v=)|youtu\.be\/)([^"&?\/\s]{11})/;
        const match = url.match(regex);
        return (match && match) ? match : null;
    }

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/steeplechaser/cmmp5mnp2007f01s3dtml6095?fresh=true',
        center: [-7.730883, 54.829779],
        zoom: 14,
        pitch: 60,
        bearing: -20,
        antialias: true
    });

    map.addControl(new mapboxgl.GeolocateControl({ trackUserLocation: true }), 'top-right');
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    map.on('load', () => {
        setTimeout(() => { document.getElementById('mobile-hint').style.opacity = '0'; }, 5000);

        map.on('click', async (e) => {
            const features = map.queryRenderedFeatures([[e.point.x - 15, e.point.y - 15], [e.point.x + 15, e.point.y + 15]]);
            if (features.length > 0) {
                const p = features.properties;
                if (!p.name) return;

                map.flyTo({ center: e.lngLat, offset:, speed: 0.6 });

                const titleHtml = `<h3 class="trail-title">${p.name}</h3>`;
                const descHtml = `<div class="trail-desc">${p.Description || p.description || ""}</div>`;
                
                const videoId = getYoutubeId(p.Youtube || p.youtube);
                let videoHtml = '';

                if (videoId) {
                    const isShort = (p.Youtube || p.youtube).includes('shorts');
                    const wrapperClass = isShort ? 'video-wrapper' : 'video-wrapper is-normal-video';

                    videoHtml = `
                        <div class="${wrapperClass}">
                            <iframe 
                                src="https://www.youtube-nocookie.com/embed/${videoId}?rel=0" 
                                title="YouTube player" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                            </iframe>
                        </div>
                    `;
                }

                new mapboxgl.Popup({ anchor: 'bottom', offset: 15 })
                    .setLngLat(e.lngLat)
                    .setHTML(titleHtml + videoHtml + descHtml)
                    .addTo(map);
            }
        });

        map.on('mousemove', (e) => {
            const f = map.queryRenderedFeatures(e.point);
            map.getCanvas().style.cursor = f.length ? 'pointer' : '';
        });
    });
</script>
</body>
</html>
